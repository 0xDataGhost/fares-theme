name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build assets
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy theme
        run: |
          rsync -avz --delete -e "ssh -p ${{ secrets.SSH_PORT }}" \
            fares-theme/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/u462218429/domains/hotpink-lark-830727.hostingersite.com/public_html/wp-content/themes/fares-theme/

      - name: Deploy plugin
        run: |
          rsync -avz --delete -e "ssh -p ${{ secrets.SSH_PORT }}" \
            fares-store/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/u462218429/domains/hotpink-lark-830727.hostingersite.com/public_html/wp-content/plugins/fares-store/
